name: GroundLine Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "17 20 * * *"

jobs:
  radar:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Run radar
        run: python3 scripts/groundline_radar.py --json --network > groundline-radar.json
      - name: Upload radar packet
        uses: actions/upload-artifact@v4
        with:
          name: groundline-radar
          path: groundline-radar.json
