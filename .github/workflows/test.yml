name: GroundLine

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
        run: |
          mkdir -p .tools
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C .tools actionlint
      - name: Lint
        run: python3 scripts/lint.py --json --require-actionlint --actionlint-bin .tools/actionlint
      - name: Validate package
        run: python3 scripts/validate_pack.py --json
      - name: Check runtime layout
        run: python3 scripts/check_runtime_layout.py --json
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Run macOS local scenario contract
        run: python3 scripts/run_scenarios.py --platform macos --sandbox local --json
      - name: Run Linux Docker dry-run contract
        run: python3 scripts/run_scenarios.py --platform linux --sandbox docker --dry-run --json
