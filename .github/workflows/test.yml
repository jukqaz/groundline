name: GroundLine

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          mkdir -p .tools
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | shasum -a 256 -c -
          tar -xzf /tmp/actionlint.tar.gz -C .tools actionlint
      - name: Lint
        run: python3 scripts/lint.py --json --require-actionlint --actionlint-bin .tools/actionlint
      - name: Check release gate plan
        run: python3 scripts/groundline_release_gate.py --plan --json --actionlint-bin .tools/actionlint
      - name: Validate package
        run: python3 scripts/validate_pack.py --json
      - name: Validate packaged plugin
        run: python3 scripts/validate_pack.py --json
        working-directory: plugins/groundline
      - name: Check runtime layout
        run: python3 scripts/check_runtime_layout.py --json
      - name: Run offline doctor
        run: python3 scripts/groundline_doctor.py --json --offline --probe-tools
      - name: Run offline radar
        run: python3 scripts/groundline_radar.py --json --offline --command-sources
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Run safety eval harness
        run: python3 scripts/groundline_safety_eval.py --json
      - name: Run staged dogfood harness
        run: python3 scripts/groundline_dogfood.py --stage-package --json
      - name: Run macOS local scenario contract
        run: python3 scripts/run_scenarios.py --platform macos --sandbox local --json
      - name: Run Linux Docker dry-run contract
        run: python3 scripts/run_scenarios.py --platform linux --sandbox docker --dry-run --json
